apiVersion: sparkoperator.k8s.io/v1alpha1
kind: SparkConnect
metadata:
  name: spark-connect
  namespace: redhat-ods-applications
spec:
  sparkVersion: 4.0.1
  sparkConf:
    spark.driver.blockManager.port: "7079"
  server:
    template:
      spec:
        containers:
        - name: spark-kubernetes-driver
          image: quay.io/opendatahub/data-processing:Spark-v4.0.1
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 1
              memory: 1Gi
            limits:
              cpu: 1
              memory: 1Gi
          securityContext:
            capabilities:
              drop:
              - ALL
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
        serviceAccountName: spark-operator-spark
  executor:
    instances: 2
    cores: 1
    memory: 512m
    template:
      spec:
        containers:
        - name: spark-kubernetes-executor
          image: quay.io/opendatahub/data-processing:Spark-v4.0.1
          imagePullPolicy: Always
          securityContext:
            capabilities:
              drop:
              - ALL
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
