apiVersion: sparkoperator.k8s.io/v1alpha1
kind: SparkConnect
metadata:
  name: spark-connect
  namespace: spark-prod-ns
spec:
  sparkVersion: 4.0.1
  server:
    template:
      spec:
        containers:
        - name: spark-kubernetes-driver
          image: docker.io/library/spark:4.0.1
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 1
              memory: 1Gi
            limits:
              cpu: 1
              memory: 1Gi
        serviceAccount: spark-operator-spark
        securityContext:
  executor:
    instances: 2
    cores: 1
    memory: 512m
    template:
      spec:
        containers:
        - name: spark-kubernetes-executor
          image: docker.io/library/spark:4.0.1
          imagePullPolicy: Always
        securityContext:
