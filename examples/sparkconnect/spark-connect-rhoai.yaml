# SparkConnect example for Red Hat OpenShift AI (RHOAI).
#
# Key differences from the default example:
# - Uses quay.io/opendatahub/data-processing image (includes start-connect-server.sh)
# - Pins spark.driver.blockManager.port so NetworkPolicies can allow it
# - Omits runAsUser/runAsGroup (OpenShift restricted-v2 SCC assigns UIDs automatically)
# - Targets the redhat-ods-applications namespace
#
# A separate NetworkPolicy must be created to allow cross-namespace access on
# ports 15002 (Spark Connect gRPC) and 7080 (BlockManager) from the workbench namespace.

apiVersion: sparkoperator.k8s.io/v1alpha1
kind: SparkConnect
metadata:
  name: spark-connect
  namespace: redhat-ods-applications
spec:
  sparkVersion: 4.0.1
  sparkConf:
    spark.driver.blockManager.port: "7080"
  server:
    template:
      metadata:
        labels:
          key1: value1
          key2: value2
        annotations:
          key3: value3
          key4: value4
      spec:
        containers:
        - name: spark-kubernetes-driver
          image: quay.io/opendatahub/data-processing:Spark-v4.0.1
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 1
              memory: 1Gi
            limits:
              cpu: 1
              memory: 1Gi
        serviceAccount: spark-operator-spark
        securityContext:
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
  executor:
    instances: 2
    cores: 1
    memory: 512m
    template:
      metadata:
        labels:
          key1: value1
          key2: value2
        annotations:
          key3: value3
          key4: value4
      spec:
        containers:
        - name: spark-kubernetes-executor
          image: quay.io/opendatahub/data-processing:Spark-v4.0.1
          imagePullPolicy: Always
        securityContext:
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
